  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:     #0B1120;
      --bg2:    #101828;
      --card:   #131F35;
      --accent: #E07040;
      --accent2:#FF8C55;
      --text:   #E8EDFF;

    html { scroll-behavior: smooth; }
    body {

      color: var(--text); overflow-x: hidden; -webkit-font-smoothing: antialiased;
      cursor: none;
    }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    /* ── CURSOR ───────────────────────────────────────────── */
    #fx-cursor {
      position:fixed;width:10px;height:10px;background:var(--accent);
      border-radius:50%;pointer-events:none;z-index:9999;
      transform:translate(-50%,-50%);
      transition:width .2s,height .2s,opacity .2s;
    }
    #fx-cursor-ring {
      position:fixed;width:32px;height:32px;
      border:1px solid rgba(224,112,64,.4);border-radius:50%;
      pointer-events:none;z-index:9998;transform:translate(-50%,-50%);
    }
    #fx-cursor.hov{width:18px;height:18px;opacity:.6;}

    /* ── GRID BG ─────────────────────────────────────────── */
    .grid-bg {
      position:fixed;inset:0;pointer-events:none;z-index:0;
      background-image:linear-gradient(var(--grid) 1px,transparent 1px),
                       linear-gradient(90deg,var(--grid) 1px,transparent 1px);
      background-size:60px 60px;

    .blog-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:12px;padding:32px 28px;
      transition:border-color .3s,transform .3s;
    }
    .blog-card:hover{border-color:rgba(224,112,64,.4);transform:translateY(-4px);}
    .blog-card-tag{
      font-family:var(--mono);font-size:.65rem;text-transform:uppercase;
      letter-spacing:.14em;color:var(--accent);margin-bottom:14px;
    }
    .blog-card h3{
      font-family:var(--sans);font-size:1.05rem;font-weight:600;
      color:var(--text);margin-bottom:10px;line-height:1.4;
    }
    .blog-card p{font-size:.88rem;color:var(--muted);line-height:1.6;}
    .blog-card-link{
      display:inline-flex;align-items:center;gap:6px;
      font-family:var(--mono);font-size:.7rem;text-transform:uppercase;
      letter-spacing:.1em;color:var(--accent);margin-top:20px;
      transition:gap .2s;
    }
    .blog-card-link:hover{gap:10px;}

    /* ── CTA SECTION ─────────────────────────────────────── */
    .cta-section{
      background:var(--card);padding:96px 48px;text-align:center;
      position:relative;overflow:hidden;
      border-top:1px solid var(--border);border-bottom:1px solid var(--border);
    }
    .cta-section::before{
      content:'';position:absolute;inset:0;
      background:radial-gradient(ellipse 60% 60% at 50% 50%,rgba(224,112,64,.07) 0%,transparent 70%);
    }
    .cta-section .section-label{color:var(--accent);position:relative;}
    .cta-section h2{
      font-family:var(--sans);font-size:clamp(2rem,4vw,3.2rem);
      font-weight:700;color:var(--text);line-height:1.15;
      margin-bottom:16px;position:relative;
    }
    .cta-section h2 em{font-style:normal;color:var(--accent);}
    .cta-section p{
      font-size:1rem;font-weight:300;color:var(--muted);
      margin-bottom:40px;position:relative;
    }
    .cta-btns{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;position:relative;}

    /* ── FOOTER ─────────────────────────────────────────── */
    footer{
      background:var(--bg);border-top:1px solid var(--border);
      padding:60px 48px 32px;position:relative;z-index:1;
    }
    .footer-top{
      display:flex;justify-content:space-between;align-items:flex-start;
      margin-bottom:48px;
    }
    .footer-logo{
      font-family:var(--mono);font-size:1rem;font-weight:600;
      letter-spacing:.14em;color:var(--text);
    }
    .footer-logo span{color:var(--accent);}
    .footer-desc{
      font-size:.88rem;font-weight:300;color:var(--muted);
      margin-top:10px;max-width:280px;line-height:1.6;
    }
    .footer-links{display:flex;gap:60px;}
    .footer-col h4{
      font-family:var(--mono);font-size:.65rem;text-transform:uppercase;
      letter-spacing:.12em;color:var(--text);margin-bottom:20px;
    }
    .footer-col ul{list-style:none;display:flex;flex-direction:column;gap:12px;}
    .footer-col a{font-size:.88rem;font-weight:300;color:var(--muted);transition:color .2s;}
    .footer-col a:hover{color:var(--accent);}
    .footer-bottom{
      border-top:1px solid var(--border);padding-top:28px;
      display:flex;justify-content:space-between;align-items:center;
    }
    .footer-bottom p,.footer-bottom a{
      font-family:var(--mono);font-size:.7rem;
      color:var(--muted);transition:color .2s;
    }
    .footer-bottom a:hover{color:var(--accent);}

    /* ── WA FLOAT ────────────────────────────────────────── */
    .wa-float{
      position:fixed;bottom:32px;right:32px;z-index:999;
      width:56px;height:56px;border-radius:50%;background:#25d366;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 20px rgba(37,211,102,.4);
      transition:transform .25s,box-shadow .25s;
    }
    .wa-float:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(37,211,102,.5);}

    /* ── REVEAL ──────────────────────────────────────────── */
    .reveal{opacity:0;transform:translateY(24px);}
    .reveal.visible{opacity:1;transform:none;transition:opacity .7s ease,transform .7s ease;}

    /* ── MOBILE ──────────────────────────────────────────── */
    @media(max-width:900px){
      nav{padding:0 20px;}
      .nav-links{display:none;}
      .hamburger{display:flex;}
      .page-hero,.blog-hero{padding:120px 24px 60px;}
      .problem-grid{grid-template-columns:1fr;gap:40px;}
      .services-detail-grid{grid-template-columns:1fr;}
      .whom-grid{grid-template-columns:1fr;}
      .case-box{grid-template-columns:1fr;gap:32px;}
      .section{padding:64px 24px;}
      .section-sm{padding:48px 24px;}
      .footer-top{flex-direction:column;gap:40px;}
      .footer-links{flex-direction:column;gap:32px;}
      .hero-stats{gap:28px;}
      .blog-grid{grid-template-columns:1fr;}
      footer{padding:48px 24px 24px;}
    }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7LBYX8W3BM"></script>
    <script>
    // Cursor
    const c = document.getElementById('fx-cursor');
    const r = document.getElementById('fx-cursor-ring');
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});
    (function loop(){
      rx+=(mx-rx)*.10; ry+=(my-ry)*.10;
      c.style.left=mx+'px'; c.style.top=my+'px';
      r.style.left=rx+'px'; r.style.top=ry+'px';
      requestAnimationFrame(loop);
    })();
    document.querySelectorAll('a,button').forEach(el=>{
      el.addEventListener('mouseenter',()=>c.classList.add('hov'));
      el.addEventListener('mouseleave',()=>c.classList.remove('hov'));
    });

    // Reveal
    const obs = new IntersectionObserver((entries)=>{
      entries.forEach(en=>{
        if(en.isIntersecting){ en.target.classList.add('visible'); obs.unobserve(en.target); }
      });
    },{threshold:0.12,rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));

    // FAQ
    document.querySelectorAll('.faq-item').forEach(item=>{
      item.addEventListener('click',()=>{
        const isOpen = item.classList.contains('open');
        document.querySelectorAll('.faq-item').forEach(i=>{
          i.classList.remove('open');
          const a = i.querySelector('.faq-answer');
          if(a) a.classList.remove('open');
        });
        if(!isOpen){
          item.classList.add('open');
          const a = item.querySelector('.faq-answer');
          if(a) a.classList.add('open');
        }
      });
    });

    // Hamburger
    const ham = document.getElementById('hamburger');
    const navLinks = document.querySelector('.nav-links');
    if(ham && navLinks){
      ham.addEventListener('click',()=>navLinks.style.display = navLinks.style.display==='flex'?'none':'flex');
    }
  </script>
</body>
</html>
