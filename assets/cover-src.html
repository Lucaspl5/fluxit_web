<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  .card{width:1080px;height:608px;background:#0B1120;position:relative;overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;padding:0 80px;box-sizing:border-box}
  .glow{position:absolute;width:560px;height:560px;border-radius:50%;
    background:radial-gradient(circle,rgba(224,112,64,.20),transparent 70%);right:-120px;top:-120px}
  .left{flex:1;z-index:2}
  .kicker{color:#E07040;font-size:20px;font-weight:700;letter-spacing:3px;margin-bottom:18px}
  .h{color:#fff;font-size:62px;font-weight:800;line-height:1.05;letter-spacing:-1.5px;margin:0}
  .h .ac{color:#E07040}
  .sub{color:#9fb0c9;font-size:24px;margin-top:22px;line-height:1.4;max-width:560px}
  .mark{width:230px;height:230px;z-index:2;margin-left:30px}
</style></head><body>
  <div class="card">
    <div class="glow"></div>
    <div class="left">
      <div class="kicker">AUTOMATIZACIÓN · IA · n8n</div>
      <h1 class="h">Automatización con IA<br><span class="ac">para inmobiliarias</span></h1>
      <div class="sub">Captación y seguimiento de leads, CRM automático y atención 24/7. Sin tocar tu forma de trabajar.</div>
    </div>
    <svg class="mark" viewBox="0 0 100 100" fill="none">
      <path d="M50 4 L91 27 L91 73 L50 96 L9 73 L9 27 Z" stroke="#E07040" stroke-width="4" fill="none" stroke-linejoin="round"/>
      <path d="M37 32 L63 32 M37 32 L37 70 M37 50 L57 50" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="66" cy="64" r="6" fill="#E07040"/>
    </svg>
  </div>
</body></html>
