<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0}
  .card{width:1128px;height:191px;background:#0B1120;position:relative;overflow:hidden;
    font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;padding:0 56px;box-sizing:border-box}
  .glow{position:absolute;width:340px;height:340px;border-radius:50%;
    background:radial-gradient(circle,rgba(224,112,64,.22),transparent 70%);right:-80px;top:-110px}
  .left{flex:1;z-index:2}
  .kicker{color:#E07040;font-size:13px;font-weight:700;letter-spacing:2.5px;margin-bottom:8px}
  .h{color:#fff;font-size:34px;font-weight:800;line-height:1.1;letter-spacing:-0.5px;margin:0}
  .h .ac{color:#E07040}
  .sub{color:#9fb0c9;font-size:15px;margin-top:8px}
  .mark{width:120px;height:120px;z-index:2;margin-left:24px}
</style></head><body>
  <div class="card">
    <div class="glow"></div>
    <div class="left">
      <div class="kicker">AUTOMATIZACIÓN · IA · n8n</div>
      <h1 class="h">Automatización con IA <span class="ac">para inmobiliarias y empresas</span></h1>
      <div class="sub">Captación de leads, CRM automático y procesos que trabajan solos · fluxit.es</div>
    </div>
    <svg class="mark" viewBox="0 0 100 100" fill="none">
      <path d="M50 4 L91 27 L91 73 L50 96 L9 73 L9 27 Z" stroke="#E07040" stroke-width="4" fill="none" stroke-linejoin="round"/>
      <path d="M37 32 L63 32 M37 32 L37 70 M37 50 L57 50" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="66" cy="64" r="6" fill="#E07040"/>
    </svg>
  </div>
</body></html>
